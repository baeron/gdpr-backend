# ============================================
# Cloud Build — GDPR Scanner Worker
# ============================================
# Trigger: manual or on push to main branch
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_DATABASE_URL="postgresql://...",_WORKER_AUTH_TOKEN="..."
#
# Required substitutions:
#   _DATABASE_URL       — PostgreSQL connection string
#   _WORKER_AUTH_TOKEN  — Auth token for worker API
# ============================================

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.worker'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gdpr-scanner-worker'
      - '--image=gcr.io/$PROJECT_ID/gdpr-scanner-worker:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=300'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--no-allow-unauthenticated'
      - '--set-env-vars=DATABASE_URL=$_DATABASE_URL,WORKER_AUTH_TOKEN=$_WORKER_AUTH_TOKEN,NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/gdpr-scanner-worker:latest'

options:
  logging: CLOUD_LOGGING_ONLY
